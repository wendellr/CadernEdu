name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── API Python (FastAPI) ────────────────────────────────────────────────────

  api:
    name: API — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: false

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

  # ── Web (Next.js) ───────────────────────────────────────────────────────────

  web:
    name: Web — lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Lê versão do packageManager no package.json — sem conflito
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type-check web_site
        run: pnpm --filter @cadernedu/web_site exec tsc --noEmit
        continue-on-error: true

      - name: Build web_site
        run: pnpm --filter @cadernedu/web_site build

  # ── Flutter ──────────────────────────────────────────────────────────────────
  # CI do Flutter é gerenciado pelo Codemagic (ver CLAUDE.md).
  # Não duplicar aqui.

  # ── Security ─────────────────────────────────────────────────────────────────

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Secrets scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
        continue-on-error: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: JS dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Python dependency audit
        uses: pypa/gh-action-pip-audit@v1.0.0
        with:
          inputs: services/api/pyproject.toml
        continue-on-error: true
