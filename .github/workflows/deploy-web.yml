name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web_site/**'
      - 'apps/web_painel/**'
      - 'packages/design_system_web/**'
      - 'packages/api_client_ts/**'

jobs:
  deploy-site:
    name: Deploy site público (Vercel)
    if: contains(github.event.head_commit.modified, 'apps/web_site/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web_site build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_SITE_PROJECT_ID }}
          working-directory: apps/web_site
          vercel-args: '--prod'

  deploy-painel:
    name: Deploy painel (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web_painel build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PAINEL_PROJECT_ID }}
          working-directory: apps/web_painel
          vercel-args: '--prod'
