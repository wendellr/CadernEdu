name: Build & push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cadernedu

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ─────────────────────────────────────────────────────────────────

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # ── Web site ─────────────────────────────────────────────────────────────

      - name: Build & push web_site
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web_site/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web_site:latest
            ${{ env.IMAGE_PREFIX }}/web_site:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=web_site
          cache-to: type=gha,scope=web_site,mode=max

      # ── Web painel ───────────────────────────────────────────────────────────

      - name: Build & push web_painel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web_painel/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web_painel:latest
            ${{ env.IMAGE_PREFIX }}/web_painel:${{ steps.tag.outputs.sha }}
          cache-from: type=gha,scope=web_painel
          cache-to: type=gha,scope=web_painel,mode=max

      - name: Summary
        run: |
          echo "### Images publicadas 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}/web_site:${{ steps.tag.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}/web_painel:${{ steps.tag.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
